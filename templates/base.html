<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MON SITE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 230px;
            height: 110vh;
            background-color: #343a40; /* couleur sombre comme navbar-dark bg-dark */
        }
        .sidebar a {
            color: #fff;
            display: block;
            padding: 0.75rem 1rem;
            text-decoration: none;
        }
        .sidebar h4 {
            color: #fff;
            display: block;
            padding: 0.25rem 0,50rem;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
            color: #fff;
        }
        .content {
            flex-grow: 1;
            padding: 2rem;
        }
    </style>
</head>
<body>

<!-- Sidebar verticale -->

<div class="sidebar">
    <h4>_ESMT_</h4>
    <h4>Gestion Projet</h4>
    <a href="/">Accueil</a>
    <a href="#">Projet</a>
    <a href="#">Liste de Taches</a>
    <a href="#">Statistique</a>
    <a href="{% url 'profile' %}">Profile</a>
<form method="post" action="{% url 'logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit" style="background:none;border:none;color:blue;cursor:pointer;">
        Se déconnecter
    </button>
</form>
</div>

<!-- Contenu principal -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
