
{% extends 'base.html' %}

{% block title %}Login here{% endblock %}
{% load crispy_forms_tags %}


{% block content %}
  <h2>Modifier le profil</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Enregistrer</button>
</form>
<a href="{% url 'profile' %}">Annuler</a>

{% endblock %}
